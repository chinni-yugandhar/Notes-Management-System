{% extends 'base.html' %}
{% block title %}Login | Notes Management System{% endblock %}
{% block content %}
<section class="auth-wrap container">
  <div class="auth-card">
    <h1 class="section-title mb-2">Welcome back</h1>
    <p class="muted-text mb-4">Login to access your private notes dashboard.</p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-main w-100">Login</button>
    </form>
    <div class="d-flex justify-content-between flex-wrap gap-2 mt-4">
      <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
      <a href="{{ url_for('register') }}">New user? Register</a>
    </div>
  </div>
</section>
{% endblock %}
