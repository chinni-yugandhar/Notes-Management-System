{% extends 'base.html' %}
{% block title %}Set New Password | Notes Management System{% endblock %}
{% block content %}
<section class="auth-wrap container">
  <div class="auth-card">
    <h1 class="section-title mb-2">Set new password</h1>
    <p class="muted-text mb-4">Enter your registered email and create a new password.</p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Registered email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">New password</label>
        <input type="password" name="new_password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm new password</label>
        <input type="password" name="confirm_password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-main w-100">Update Password</button>
    </form>
  </div>
</section>
{% endblock %}
