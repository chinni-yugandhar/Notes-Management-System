{% extends 'base.html' %}
{% block title %}Register | Notes Management System{% endblock %}
{% block content %}
<section class="auth-wrap container">
  <div class="auth-card">
    <h1 class="section-title mb-2">Create account</h1>
    <p class="muted-text mb-4">Register to start creating and managing notes securely.</p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
      </div>
      <button type="submit" class="btn btn-main w-100">Register</button>
    </form>
  </div>
</section>
{% endblock %}
