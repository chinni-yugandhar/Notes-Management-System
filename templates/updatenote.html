{% extends 'base.html' %}
{% block title %}Update Note | Notes Management System{% endblock %}
{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="custom-card p-4 p-lg-5">
        <h1 class="section-title mb-3">Update note</h1>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ note.title }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Content</label>
            <textarea name="content" rows="8" class="form-control" required>{{ note.content }}</textarea>
          </div>
          <button class="btn btn-main">Update Note</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
