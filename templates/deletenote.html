{% extends 'base.html' %}
{% block title %}Delete Note | Notes Management System{% endblock %}
{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="custom-card p-5 text-center">
        <h1 class="section-title mb-3">Note deleted</h1>
        <p class="muted-text">The selected note has been removed successfully from your account.</p>
        <a href="{{ url_for('viewnotes') }}" class="btn btn-main mt-3">Back to Notes</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
