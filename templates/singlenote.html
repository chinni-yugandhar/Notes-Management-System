{% extends 'base.html' %}
{% block title %}Single Note | Notes Management System{% endblock %}
{% block content %}
<section class="container py-5">
  <div class="custom-card p-4 p-lg-5">
    <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
      <div>
        <span class="info-badge">Single note view</span>
        <h1 class="section-title mt-3">{{ note.title }}</h1>
      </div>
      <div class="d-flex gap-2 align-self-start">
        <a href="{{ url_for('updatenote', note_id=note.id) }}" class="btn btn-warning">Edit</a>
        <a href="{{ url_for('deletenote', note_id=note.id) }}" class="btn btn-danger">Delete</a>
      </div>
    </div>
    <p class="muted-text mb-2">Created: {{ note.created_at }}</p>
    <hr>
    <p style="white-space: pre-line;">{{ note.content }}</p>
    <a href="{{ url_for('viewnotes') }}" class="btn btn-soft mt-3">Back to all notes</a>
  </div>
</section>
{% endblock %}
